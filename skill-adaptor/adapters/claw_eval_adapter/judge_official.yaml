# Official Claw-Eval LLM judge (submitted / paper path).
# Credentials stay in secrets/.env — never commit keys.
#
# Interface (OpenAI-compatible):
#   CLAW_EVAL_JUDGE_API_KEY=<key>
#   CLAW_EVAL_JUDGE_BASE_URL=https://openrouter.ai/api/v1
#   # model_id is locked in code to google/gemini-3-flash-preview
#
# Equivalent:
#   OPENROUTER_API_KEY=<key>   # base defaults to OpenRouter

judge:
  model_id: google/gemini-3-flash-preview
  base_url: https://openrouter.ai/api/v1
  enabled: true
  notes: |
    Matches claw-eval config_general.yaml.
    SkillAdaptor production ignores CLAW_EVAL_JUDGE_MODEL overrides unless
    CLAW_EVAL_ALLOW_NONOFFICIAL_JUDGE=1 (local wiring_judge only).
