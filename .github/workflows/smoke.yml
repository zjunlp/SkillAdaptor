name: smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (tracked files, no API)
        run: |
          ! git grep -E 'sk-[a-zA-Z0-9]{20,}' -- ':!*.example' ':!secrets/*' || exit 1
          ! git grep -E 'ghp_[a-zA-Z0-9]{20,}|github_pat_[a-zA-Z0-9_]{20,}' || exit 1
          ! git grep -E 'http://(35|34)\.[0-9]+\.' || exit 1
          echo "secret_scan_ok"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: skill-adaptor
        run: pip install -r requirements.txt openai pydantic pyyaml

      - name: Import core modules
        working-directory: skill-adaptor
        run: |
          python -c "from core.orchestrator import SkillAdaptorOrchestrator"
          python -c "from core.api_env import CHAT_API_KEY_VAR, CHAT_BASE_URL_VAR"
          python -c "from core.provider_config import resolve_provider, validate_profile"
          python -c "from adapters.claw_eval_adapter.executor import ClawEvalExecutor"
          python -c "from runtime.skill_export import export_skills_to_workspace, format_skill_markdown"
          python -c "from runtime.plugin_host import PluginHost"

      - name: Plugin init + dry-run (no API)
        working-directory: skill-adaptor
        run: |
          python run_plugin.py init --workspace /tmp/sa-ws
          mkdir -p /tmp/sa-ws/input_task
          cat > /tmp/sa-ws/input_task/smoke_task.md <<'EOF'
          ---
          id: smoke_task
          category: shell
          ---
          # Smoke task
          ## Prompt
          Write one safe shell command to command.txt.
          EOF
          python run_plugin.py --workspace /tmp/sa-ws --dry-run

      - name: Provider template validation
        working-directory: skill-adaptor
        run: |
          python -c "
          import os
          os.environ['SkillAdaptor_API_KEY']='test'
          os.environ['SkillAdaptor_BASE_URL']='http://127.0.0.1:1/v1'
          os.environ['SkillAdaptor_MODEL']='gpt-4.1'
          from core.provider_config import resolve_provider, validate_profile
          p = resolve_provider('relay-gpt41')
          assert not validate_profile(p) or 'missing' not in str(validate_profile(p))
          print('provider_config_ok')
          "

  # Live smoke requires secrets — enable when SkillAdaptor_API_KEY is configured in repo secrets
  live-smoke:
    if: false  # set to: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Live PinchBench smoke (manual only)
        run: echo "Configure SkillAdaptor_API_KEY + PINCHBENCH_PATH in secrets to enable"
